<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" shape-rendering="geometricPrecision">
  <title>Pomo F1 — coffee livery</title>

  <defs>
    <!-- Tire gradient -->
    <linearGradient id="tire-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#1a0d04"/>
      <stop offset="100%" stopColor="#0a0503"/>
    </linearGradient>

    <!-- Body gradient (subtle, espresso) -->
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#3e1f00"/>
      <stop offset="100%" stopColor="#1a0d04"/>
    </linearGradient>

    <!-- Caramel stripe gradient -->
    <linearGradient id="stripe-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stopColor="#b08d57"/>
      <stop offset="50%" stopColor="#d4b896"/>
      <stop offset="100%" stopColor="#b08d57"/>
    </linearGradient>

    <!-- Crema / foam highlight on top -->
    <linearGradient id="foam-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="#f5e6d3"/>
      <stop offset="100%" stopColor="#c4a882"/>
    </linearGradient>
  </defs>

  <!-- ─── Floor / underbody (long thin bar) ─── -->
  <path d="M 70 235 L 740 235 L 750 250 L 60 250 Z" fill="#1a0d04"/>

  <!-- ─── Rear wing structure (left side of car) ─── -->
  <!-- End plate -->
  <rect x="22" y="98" width="14" height="158" rx="2" fill="url(#body-grad)"/>
  <!-- Top wing element -->
  <path d="M 18 95 L 100 90 L 100 112 L 18 115 Z" fill="#3e1f00"/>
  <!-- DRS slot detail -->
  <rect x="28" y="103" width="68" height="2" fill="#5d2e0c" opacity="0.6"/>
  <!-- Lower beam wing -->
  <path d="M 18 210 L 90 205 L 90 222 L 18 226 Z" fill="#3e1f00"/>
  <!-- Mount stalk -->
  <rect x="60" y="115" width="6" height="95" fill="#2a1408"/>

  <!-- ─── Engine cover / airbox / sharkfin (rear-mid) ─── -->
  <path d="M 100 215
           L 140 195
           L 200 165
           L 280 130
           L 360 110
           L 410 110
           L 420 215 Z"
        fill="url(#body-grad)"/>

  <!-- Roll hoop / airbox intake -->
  <path d="M 360 90 Q 380 80 410 90 L 420 110 L 360 110 Z" fill="#1a0d04"/>
  <ellipse cx="385" cy="94" rx="14" ry="4" fill="#0a0503"/>

  <!-- ─── Sidepod (mid) ─── -->
  <path d="M 200 215
           Q 240 178 320 175
           L 540 178
           Q 580 180 600 200
           L 600 232
           L 200 232 Z"
        fill="url(#body-grad)"/>

  <!-- Sidepod inlet (intake) -->
  <path d="M 280 188 Q 300 180 330 180 L 330 202 Q 300 208 280 208 Z" fill="#0a0503"/>

  <!-- ─── Cockpit + halo ─── -->
  <!-- Driver headrest area -->
  <path d="M 420 110 L 470 112 L 480 130 L 420 130 Z" fill="#1a0d04"/>
  <!-- Halo loop -->
  <path d="M 430 88 Q 470 60 520 95"
        fill="none" stroke="#0a0503" stroke-width="8" stroke-linecap="round"/>
  <!-- Halo front mount -->
  <path d="M 520 95 L 525 130" stroke="#0a0503" stroke-width="6" stroke-linecap="round"/>
  <!-- Driver helmet (peeking) -->
  <ellipse cx="475" cy="100" rx="20" ry="14" fill="#3e1f00"/>
  <ellipse cx="475" cy="100" rx="18" ry="12" fill="#5d2e0c"/>
  <!-- Helmet visor strip -->
  <rect x="468" y="92" width="22" height="5" rx="1" fill="#f5e6d3"/>

  <!-- ─── Nose + front bulkhead ─── -->
  <path d="M 480 130
           L 540 165
           Q 600 175 660 195
           L 720 220
           L 720 232
           L 480 232 Z"
        fill="url(#body-grad)"/>

  <!-- Nose tip taper -->
  <path d="M 660 195 L 740 218 L 740 228 L 660 215 Z" fill="#1a0d04"/>

  <!-- ─── Front wing ─── -->
  <!-- Main plane -->
  <path d="M 690 235 L 790 232 L 790 250 L 690 252 Z" fill="#3e1f00"/>
  <!-- Front wing end plate -->
  <path d="M 770 220 L 795 220 L 795 258 L 770 258 Z" fill="#1a0d04"/>
  <!-- Flap detail -->
  <rect x="700" y="240" width="80" height="2" fill="#5d2e0c"/>

  <!-- ─── Caramel accent stripe (livery) ─── -->
  <path d="M 90 218
           Q 200 198 320 200
           Q 480 204 600 215
           Q 660 220 720 222"
        fill="none" stroke="url(#stripe-grad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Crema highlight curve along upper bodywork -->
  <path d="M 220 175
           Q 290 145 380 130
           Q 420 122 470 122"
        fill="none" stroke="url(#foam-grad)" stroke-width="2.5" opacity="0.85"/>

  <!-- ─── Livery text & numbers ─── -->
  <g font-family="Arial Black, Impact, sans-serif">
    <!-- Big number "25" (the focus minutes) -->
    <text x="220" y="218" font-size="48" font-weight="900" fill="#d4b896" letterSpacing="-1">25</text>

    <!-- Brand text on sidepod -->
    <text x="290" y="218" font-size="22" font-weight="900" fill="#f5e6d3" letterSpacing="2">POMO</text>
    <text x="290" y="232" font-size="10" font-weight="700" fill="#c4a882" letterSpacing="3">COFFEE RACING</text>

    <!-- Small mark on engine cover -->
    <text x="295" y="158" font-size="11" font-weight="700" fill="#c4a882" letterSpacing="2">ESPRESSO</text>

    <!-- Sponsor on rear wing -->
    <text x="32" y="108" font-size="7" font-weight="700" fill="#c4a882" letterSpacing="1">GRIND · FOCUS · BREW</text>

    <!-- Side mark near front -->
    <text x="540" y="218" font-size="10" font-weight="700" fill="#c4a882" letterSpacing="2">MOCHA</text>
  </g>

  <!-- Coffee bean motif near driver -->
  <g transform="translate(440 122) rotate(-25)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#3e1f00" stroke="#c4a882" stroke-width="0.8"/>
    <path d="M -8 0 Q 0 -2 8 0" fill="none" stroke="#c4a882" stroke-width="0.8"/>
  </g>

  <!-- ─── Wheels (on top) ─── -->
  <!-- Rear wheel -->
  <g>
    <circle cx="130" cy="240" r="58" fill="url(#tire-grad)"/>
    <circle cx="130" cy="240" r="38" fill="#3e1f00"/>
    <circle cx="130" cy="240" r="32" fill="#1a0d04"/>
    <!-- Rim spokes -->
    <g stroke="#5d2e0c" stroke-width="2">
      <line x1="130" y1="210" x2="130" y2="270"/>
      <line x1="100" y1="240" x2="160" y2="240"/>
      <line x1="109" y1="219" x2="151" y2="261"/>
      <line x1="151" y1="219" x2="109" y2="261"/>
    </g>
    <circle cx="130" cy="240" r="6" fill="#d4b896"/>
    <circle cx="130" cy="240" r="3" fill="#3e1f00"/>
    <!-- Tire sidewall lettering -->
    <text x="130" y="295" font-size="7" font-family="Arial Black, sans-serif" font-weight="900" fill="#5d2e0c" textAnchor="middle" letterSpacing="1">POMO</text>
  </g>

  <!-- Front wheel -->
  <g>
    <circle cx="660" cy="240" r="58" fill="url(#tire-grad)"/>
    <circle cx="660" cy="240" r="38" fill="#3e1f00"/>
    <circle cx="660" cy="240" r="32" fill="#1a0d04"/>
    <g stroke="#5d2e0c" stroke-width="2">
      <line x1="660" y1="210" x2="660" y2="270"/>
      <line x1="630" y1="240" x2="690" y2="240"/>
      <line x1="639" y1="219" x2="681" y2="261"/>
      <line x1="681" y1="219" x2="639" y2="261"/>
    </g>
    <circle cx="660" cy="240" r="6" fill="#d4b896"/>
    <circle cx="660" cy="240" r="3" fill="#3e1f00"/>
    <text x="660" y="295" font-size="7" font-family="Arial Black, sans-serif" font-weight="900" fill="#5d2e0c" textAnchor="middle" letterSpacing="1">POMO</text>
  </g>
</svg>
