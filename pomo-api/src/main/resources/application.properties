server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pomodoro}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pomodoro}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pomodoro}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Comma-separated list of allowed CORS origins. Defaults to local dev.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
